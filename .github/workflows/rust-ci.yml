name: Rust CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'rust/**'
      - '.github/workflows/rust-ci.yml'
      - 'pyproject.toml'
  push:
    branches: [main]
    paths:
      - 'rust/**'
      - '.github/workflows/rust-ci.yml'

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --workspace --exclude sylvan-py -- -D warnings

      - name: Clippy (sylvan-py)
        run: cargo clippy --lib -p sylvan-py -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace --exclude sylvan-py

      - name: Docs
        run: cargo doc --no-deps --workspace --exclude sylvan-py
        env:
          RUSTDOCFLAGS: "-D warnings"
