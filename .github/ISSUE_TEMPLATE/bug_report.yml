name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please fill out the details below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Index a project with `sylvan index /path/to/project`
        2. Call `search_symbols(query='...', repo='...')`
        3. See error in response
    validations:
      required: true

  - type: input
    id: sylvan-version
    attributes:
      label: Sylvan version
      description: Run `sylvan --version` or check `get_session_stats` output.
      placeholder: "1.3.3"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - pip install sylvan
        - uv pip install sylvan
        - uv tool install sylvan
        - Editable (git clone + uv sync)
    validations:
      required: true

  - type: dropdown
    id: editor
    attributes:
      label: Editor / Agent
      options:
        - Claude Code
        - Cursor
        - Windsurf
        - GitHub Copilot
        - Claude Agent SDK
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`.
      placeholder: "3.12.12"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (other)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant lines from `~/.sylvan/logs/sylvan.log` or call `get_logs` via MCP. This field is automatically formatted as code.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else - screenshots, dashboard state, number of indexed repos, config overrides, etc.
    validations:
      required: false
