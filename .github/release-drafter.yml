name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/darki73/sylvan/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
categories:
  - title: Features
    labels:
      - enhancement
  - title: Bug Fixes
    labels:
      - bug
  - title: Dependencies
    labels:
      - dependencies
  - title: CI
    labels:
      - ci
change-template: '- $TITLE (#$NUMBER)'
version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - enhancement
  patch:
    labels:
      - bug
      - dependencies
      - ci
  default: patch
